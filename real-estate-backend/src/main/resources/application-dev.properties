# ═══════════════════════════════════════════════
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# ═══════════════════════════════════════════════

# ─── App ────────────────────────────────────────
spring.application.name=real-estate-api
server.port=8088
server.servlet.context-path=/
# ??? MySQL Database ?????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3307/realestate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=7896
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.pool-name=RealEstateHikariPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ??? JPA / Hibernate ????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ─── JWT ────────────────────────────────────────
jwt.secret=ThisIsAVeryLongSecretKeyForRealEstateDevThatIsAtLeast256BitsLong123456
jwt.access-token-expiry=86400000
jwt.refresh-token-expiry=604800000

# Values explained:
# jwt.access-token-expiry  = 86400000  ms = 24 hours
# jwt.refresh-token-expiry = 604800000 ms = 7  days

# ─── Mail (Gmail SMTP) ──────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rishisahu8822@gmail.com
spring.mail.password=cgmvqfvmdrggeoxn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

# ─── Frontend URL ───────────────────────────────
app.frontend.url=http://localhost:5173

# ─── File Upload ────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# ??? Swagger / OpenAPI ??????????????????????????
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.packages-to-scan=com.example.demo.controller
springdoc.paths-to-match=/api/**

# ─── Logging ────────────────────────────────────
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/realestate-dev.log

# ─── Error Handling ─────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# ─── Actuator (Health checks) ───────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Real Estate API
info.app.version=1.0.0
info.app.environment=development